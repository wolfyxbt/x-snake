<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>x-snake</title>
    <meta
      name="description"
      content="一个可以在 X (Twitter) 帖子预览中直接游玩的贪吃蛇小游戏"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="x-snake" />
    <meta
      property="og:description"
      content="一个可以在 X (Twitter) 帖子预览中直接游玩的贪吃蛇小游戏"
    />
    <meta property="og:url" content="https://x-snake.vercel.app/" />
    <meta property="og:image" content="https://x-snake.vercel.app/preview.png" />
    <meta name="twitter:card" content="player" />
    <meta name="twitter:title" content="x-snake" />
    <meta
      name="twitter:description"
      content="一个可以在 X (Twitter) 帖子预览中直接游玩的贪吃蛇小游戏"
    />
    <meta name="twitter:image" content="https://x-snake.vercel.app/preview.png" />
    <meta name="twitter:player" content="https://x-snake.vercel.app/?embed=1" />
    <meta name="twitter:player:width" content="640" />
    <meta name="twitter:player:height" content="480" />
    <link rel="canonical" href="https://x-snake.vercel.app/" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-labelledby="page-title">
      <section class="game-panel" aria-label="游戏区域">
        <!-- 左：游戏画布 -->
        <div class="board-shell">
          <canvas
            id="game-board"
            width="400"
            height="400"
            role="img"
            aria-label="贪吃蛇游戏画布"
          ></canvas>
          <div class="board-overlay is-hidden" id="board-overlay" aria-live="polite">
            <p class="overlay-title" id="overlay-title"></p>
            <p class="overlay-copy is-hidden" id="overlay-copy"></p>
            <button type="button" class="overlay-restart is-hidden" id="overlay-restart">重新开始</button>
          </div>
        </div>

        <!-- 右：信息 + 控制 -->
        <div class="sidebar">
          <h1 id="page-title">x-snake</h1>

          <div class="social-links">
            <a class="social-link" href="https://github.com/wolfyxbt/x-snake" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12Z"/></svg>
            </a>
            <a class="social-link" href="https://x.com/wolfyxbt" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
          </div>

          <div class="stat-group">
            <div class="stat-card">
              <span class="stat-label">最高分</span>
              <strong class="stat-value" id="high-score-value">0</strong>
            </div>
            <div class="stat-card">
              <span class="stat-label">分数</span>
              <strong class="stat-value" id="score-value">0</strong>
            </div>
          </div>

          <div class="controls-panel">
            <div class="controls-grid" aria-label="方向控制">
              <span></span>
              <button type="button" class="control-button" data-direction="up" aria-label="向上">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m5 12 7-7 7 7"/></svg>
              </button>
              <span></span>
              <button type="button" class="control-button" data-direction="left" aria-label="向左">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
              </button>
              <button type="button" class="control-button" data-direction="down" aria-label="向下">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m19 12-7 7-7-7"/></svg>
              </button>
              <button type="button" class="control-button" data-direction="right" aria-label="向右">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
